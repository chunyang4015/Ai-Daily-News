name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = Beijing 08:00, daily fetch + build + deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch news with Agnes AI
        run: pnpm fetch-news
        env:
          AI_PROVIDER: agnes
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: Commit news data
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news/*.json
          if git diff --cached --quiet; then
            echo "No news data changes, skipping commit."
          else
            git commit -m "add news $(date +%Y-%m-%d) data"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/chunyang4015/Ai-Daily-News.git main
          fi

      - run: pnpm build

      - name: Create Cloudflare Pages project (skip if exists)
        run: npx wrangler pages project create ai-daily-news --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=ai-daily-news
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
