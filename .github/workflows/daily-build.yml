name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = Beijing 06:00, daily fetch + build + deploy
    - cron: '0 0 * * *'   # UTC 00:00 = Beijing 08:00, daily fetch + build + deploy
    - cron: '10 02 * * *' # UTC 02:10 = Beijing 10:10, daily fetch + build + deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch news with Agnes AI
        run: pnpm fetch-news
        env:
          AI_PROVIDER: agnes
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - run: pnpm build

      - name: Create Cloudflare Pages project (skip if exists)
        run: npx wrangler pages project create ai-daily-news --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=ai-daily-news
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
