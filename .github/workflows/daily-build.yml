name: Daily News Build

on:
  schedule:
    # UTC 22:00 = Beijing 06:00 daily
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    # Generated news JSON is committed by this workflow itself; ignore those
    # pushes so they don't re-trigger a build (infinite-loop guard, also
    # enforced by GitHub: pushes made with GITHUB_TOKEN never trigger workflows).
    paths-ignore:
      - 'src/data/news/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit generated news JSON back to the repo
    env:
      # Group news by Beijing day; fetch-news derives the filename from local date.
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Fetch + commit only run on schedule/manual. Source-code pushes skip this.
      - name: Fetch news & generate summaries
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: pnpm fetch-news
        env:
          AI_PROVIDER: agnes
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: Commit generated news JSON
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/news/
          if git diff --cached --quiet; then
            echo "No new news data to commit."
          else
            DATE=$(node -e 'const d=new Date();const p=n=>String(n).padStart(2,"0");process.stdout.write(d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()))')
            git commit -m "chore: add news ${DATE} data"
            git push
          fi

      - name: Create Cloudflare Pages project (skip if exists)
        run: npx wrangler pages project create ai-daily-news --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=ai-daily-news
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
